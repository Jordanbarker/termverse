name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build         # termoil     -> apps/termoil/out
      - run: npm run build:crunch  # term-crunch -> apps/term-crunch/out
      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp site/index.html _site/
          mkdir -p _site/termoil
          cp -r apps/termoil/out/. _site/termoil/
          mkdir -p _site/term-crunch
          cp -r apps/term-crunch/out/. _site/term-crunch/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
